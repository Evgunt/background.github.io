<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GMod Loading Screen</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000; /* Цвет пока грузится фон */
        }

        /* Фоновое изображение */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('inc/background.jpg') no-repeat center center fixed;
            background-size: cover;
            z-index: 1;
        }

        /* Затемнение и контент */
        .overlay {
            position: relative;
            z-index: 2;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Затемнение фона */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .server-name {
            font-size: 4em;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        .status {
            font-size: 1.5em;
            font-style: italic;
            opacity: 0.8;
        }
    </style>
<script>
    // Скрипт для настройки громкости (0.5 — это 50%)
    var audio = document.getElementById("loading-music");
    audio.volume = 0.3; 
</script>
</head>
<body>

    <div class="background"></div>

    <div class="overlay">
        <h1 class="server-name">SITE-L (Swallow)</h1>
        <p class="status">Загрузка ресурсов сервера...</p>
    </div>
<audio id="loading-music" autoplay loop>
    <source src="inc/fon.mp3" type="audio/mpeg">
</audio>

</body>
</html>
