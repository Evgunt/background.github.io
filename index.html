<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GMod Loading Screen</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000; /* Цвет пока грузится фон */
        }

        /* Фоновое изображение */
        .background {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('inc/background.jpg') no-repeat center center fixed;
    background-size: cover;
    z-index: 1;
    
    animation: slowZoom 30s ease-in-out infinite alternate;
}

/* Сценарий анимации */
@keyframes slowZoom {
    0% {
        transform: scale(1); /* Обычный размер */
    }
    100% {
        transform: scale(1.15); /* Увеличение на 15% */
    }
}
        /* Затемнение и контент */
        .overlay {
            position: relative;
            z-index: 2;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Затемнение фона */
            display: flex;
padding-top: 15%;
            align-items: center;
            color: white;
            text-align: center;
        }

        .server-name {
            font-size: 4em;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        .status {
            font-size: 1.5em;
            font-style: italic;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="overlay">
        <h1 class="server-name">SITE-L (Swallow)</h1>
        <p class="status">Загрузка ресурсов сервера...</p>
    </div>
<audio id="loading-music" autoplay loop>
    <source src="inc/fon.mp3" type="audio/mpeg">
</audio>
<script>
    var audio = document.getElementById("loading-music");
    audio.volume = 0.3;

    window.addEventListener('click', function() {
        audio.play();
    });

    function fadeOutAudio() {
        var fadePoint = setInterval(function () {
            if (audio.volume > 0.02) {
                audio.volume -= 0.02;
            } else {
                audio.volume = 0;
                audio.pause();
                clearInterval(fadePoint);
            }
        }, 100);
    }

    function OnLoadFinished() {
        fadeOutAudio();
    }

    function SetStatusChanged(status) {
        if (status.indexOf("Sending client info") !== -1) {
            fadeOutAudio();
        }
    }
</script>
</body>
</html>
